<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Take the Lead Coach | First Class Leaders</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #1D2B58;
    --navy-soft: #29396e;
    --blue: #0062A9;
    --cloud: #E2EDF6;
    --horizon: #F7941E;
    --sunrise: #FFD874;
    --cream: #E4E4CA;
    --ink: #1D2B58;
    --paper: #FAFAF6;
    --line: #DCE3EC;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-height: 100dvh;
  }

  /* ---------- Header ---------- */

  header {
    background: var(--navy);
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .brand-eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    color: var(--horizon);
    text-transform: uppercase;
    font-weight: 600;
    margin: 0 0 2px;
  }

  .brand-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: #fff;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .reset-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    border-radius: 8px;
    padding: 7px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.16); }
  .reset-btn svg { width: 13px; height: 13px; }

  /* Signature element: the horizon line. A gradient bar reading like an
     artificial horizon instrument, sky to ground, cool to warm. It is the
     one visual flourish on the page; everything else stays quiet. */
  .horizon-line {
    height: 4px;
    flex-shrink: 0;
    background: linear-gradient(90deg, var(--blue) 0%, var(--cloud) 42%, var(--sunrise) 68%, var(--horizon) 100%);
  }

  /* ---------- Access gate ---------- */

  #gate {
    position: fixed;
    inset: 0;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 50;
  }

  .gate-card {
    max-width: 380px;
    width: 100%;
    text-align: center;
  }

  .gate-chevron {
    width: 40px;
    height: 40px;
    margin: 0 auto 22px;
  }

  .gate-card h1 {
    font-family: 'Space Grotesk', sans-serif;
    color: #fff;
    font-size: 24px;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  .gate-card p {
    color: #C6D1E8;
    font-size: 14.5px;
    line-height: 1.55;
    margin: 0 0 26px;
  }

  .gate-card input {
    width: 100%;
    padding: 13px 15px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 0.04em;
  }
  .gate-card input::placeholder { color: #8494bd; letter-spacing: normal; }
  .gate-card input:focus { border-color: var(--horizon); }

  .gate-card button {
    width: 100%;
    padding: 13px 15px;
    border-radius: 10px;
    border: none;
    background: var(--horizon);
    color: var(--navy);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  .gate-card button:hover { filter: brightness(1.06); }
  .gate-card button:disabled { opacity: 0.6; cursor: default; }

  .gate-error {
    color: #FFB4A8;
    font-size: 13px;
    margin-top: 12px;
    min-height: 16px;
  }

  /* ---------- Chat ---------- */

  #chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 22px 16px 12px;
  }

  #chat-inner {
    max-width: 660px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .row { display: flex; align-items: flex-end; gap: 9px; }
  .row.user { justify-content: flex-end; }
  .row.coach { justify-content: flex-start; }

  .avatar {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    border-radius: 7px;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .avatar svg { width: 13px; height: 13px; }

  .bubble {
    padding: 12px 15px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.55;
    max-width: 78%;
    white-space: pre-wrap;
    word-wrap: break-word;
    animation: rise 0.25s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .row.coach .bubble {
    background: #fff;
    border: 1px solid var(--line);
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }

  .row.user .bubble {
    background: var(--blue);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .row.system .bubble {
    background: var(--cream);
    color: var(--navy);
    border: 1px solid #d8d8bd;
    font-size: 13.5px;
    max-width: 90%;
  }

  .typing-row .bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 16px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #9aa8c4;
    animation: pulse 1.1s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.35; transform: scale(0.85); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* ---------- Input bar ---------- */

  #input-bar {
    flex-shrink: 0;
    border-top: 1px solid var(--line);
    background: #fff;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  }

  #input-inner {
    max-width: 660px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  #msg-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 11px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.4;
    max-height: 130px;
    outline: none;
    color: var(--ink);
    background: var(--paper);
  }
  #msg-input:focus { border-color: var(--blue); }

  #send-btn {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    border: none;
    background: var(--horizon);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: filter 0.15s ease, opacity 0.15s ease;
  }
  #send-btn:hover { filter: brightness(1.06); }
  #send-btn:disabled { opacity: 0.45; cursor: default; }
  #send-btn svg { width: 18px; height: 18px; }

  .footnote {
    text-align: center;
    font-size: 11px;
    color: #9aa4bd;
    margin: 8px 0 0;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #d6dce7; border-radius: 8px; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <svg class="gate-chevron" viewBox="0 0 40 40" fill="none">
      <path d="M4 26L20 10L36 26" stroke="#F7941E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M11 32L20 23L29 32" stroke="#0062A9" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Take the Lead Coach</h1>
    <p>A rep based coaching space from First Class Leaders. Enter your academy access code to begin.</p>
    <input id="gate-input" type="text" placeholder="ACCESS CODE" autocomplete="off" autocapitalize="off" spellcheck="false" />
    <button id="gate-btn">Enter</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <div>
      <p class="brand-eyebrow">First Class Leaders</p>
      <p class="brand-title">Take the Lead Coach</p>
    </div>
    <button class="reset-btn" id="reset-btn" title="Start a new rep">
      <svg viewBox="0 0 20 20" fill="none"><path d="M16.5 10a6.5 6.5 0 1 1-2.1-4.8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/><path d="M16.5 3v4h-4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      New rep
    </button>
  </header>
  <div class="horizon-line"></div>

  <div id="chat-scroll">
    <div id="chat-inner"></div>
  </div>

  <div id="input-bar">
    <div id="input-inner">
      <textarea id="msg-input" rows="1" placeholder="Type your reply..."></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 10h13M10 4l7 6-7 6" stroke="#1D2B58" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <p class="footnote">Coaching reps, not a substitute for professional or medical support.</p>
  </div>
</div>

<script>
(function () {
  // Set this to false if you are not using the access code gate on the
  // server (i.e. you never set an ACCESS_CODE environment variable in
  // Netlify). Leaving it true with no server side code set means the
  // gate still shows, but any code entered will be accepted.
  var ACCESS_GATE_ENABLED = true;

  var gate = document.getElementById('gate');
  var gateInput = document.getElementById('gate-input');
  var gateBtn = document.getElementById('gate-btn');
  var gateError = document.getElementById('gate-error');
  var app = document.getElementById('app');
  var chatInner = document.getElementById('chat-inner');
  var chatScroll = document.getElementById('chat-scroll');
  var msgInput = document.getElementById('msg-input');
  var sendBtn = document.getElementById('send-btn');
  var resetBtn = document.getElementById('reset-btn');

  var conversation = [];
  var accessCode = sessionStorage.getItem('fcl_access_code') || '';
  var sending = false;

  var coachAvatar = '<div class="avatar"><svg viewBox="0 0 20 20" fill="none"><path d="M3 12L10 5L17 12" stroke="#F7941E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';

  function scrollToBottom() {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function renderMessage(role, text) {
    var row = document.createElement('div');
    row.className = 'row ' + role;
    var bubble = '<div class="bubble">' + escapeHtml(text) + '</div>';
    if (role === 'coach') {
      row.innerHTML = coachAvatar + bubble;
    } else {
      row.innerHTML = bubble;
    }
    chatInner.appendChild(row);
    scrollToBottom();
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.innerText = str;
    return div.innerHTML;
  }

  var typingRow = null;
  function showTyping() {
    typingRow = document.createElement('div');
    typingRow.className = 'row coach typing-row';
    typingRow.innerHTML = coachAvatar + '<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    chatInner.appendChild(typingRow);
    scrollToBottom();
  }
  function hideTyping() {
    if (typingRow) { typingRow.remove(); typingRow = null; }
  }

  function setSending(state) {
    sending = state;
    sendBtn.disabled = state;
    msgInput.disabled = state;
  }

  function callCoach() {
    setSending(true);
    showTyping();

    var headers = { 'Content-Type': 'application/json' };
    if (accessCode) headers['x-access-code'] = accessCode;

    fetch('/api/chat', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({ messages: conversation })
    })
      .then(function (res) {
        return res.json().then(function (data) { return { ok: res.ok, data: data }; });
      })
      .then(function (result) {
        hideTyping();
        setSending(false);
        if (!result.ok) {
          if (chatInner.children.length === 0) {
            // Failed on the opening message, most likely a bad access code.
            showGateError(result.data.error || 'Something went wrong. Try again.');
            gate.style.display = 'flex';
            app.style.display = 'none';
            return;
          }
          renderMessage('system', result.data.error || 'Something went wrong reaching the coach. Try sending that again.');
          return;
        }
        conversation.push({ role: 'assistant', content: result.data.reply });
        renderMessage('coach', result.data.reply);
        msgInput.focus();
      })
      .catch(function () {
        hideTyping();
        setSending(false);
        renderMessage('system', 'Could not reach the coach. Check your connection and try again.');
      });
  }

  function startSession() {
    conversation = [{ role: 'user', content: 'Begin the session.' }];
    chatInner.innerHTML = '';
    callCoach();
  }

  function sendUserMessage() {
    var text = msgInput.value.trim();
    if (!text || sending) return;
    conversation.push({ role: 'user', content: text });
    renderMessage('user', text);
    msgInput.value = '';
    msgInput.style.height = 'auto';
    callCoach();
  }

  sendBtn.addEventListener('click', sendUserMessage);
  msgInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendUserMessage();
    }
  });
  msgInput.addEventListener('input', function () {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 130) + 'px';
  });

  resetBtn.addEventListener('click', function () {
    if (sending) return;
    if (confirm('Start a new rep? This clears the current conversation.')) {
      startSession();
    }
  });

  function showGateError(msg) {
    gateError.textContent = msg;
  }

  function enterApp() {
    gate.style.display = 'none';
    app.style.display = 'flex';
    startSession();
  }

  gateBtn.addEventListener('click', function () {
    var code = gateInput.value.trim();
    if (ACCESS_GATE_ENABLED && !code) {
      showGateError('Enter your access code to continue.');
      return;
    }
    accessCode = code;
    sessionStorage.setItem('fcl_access_code', code);
    showGateError('');
    gateBtn.disabled = true;
    gateBtn.textContent = 'Connecting...';
    enterApp();
    setTimeout(function () { gateBtn.disabled = false; gateBtn.textContent = 'Enter'; }, 800);
  });

  gateInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') gateBtn.click();
  });

  if (!ACCESS_GATE_ENABLED) {
    enterApp();
  } else if (accessCode) {
    gateInput.value = accessCode;
  }
})();
</script>

</body>
</html>
